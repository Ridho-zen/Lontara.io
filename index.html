<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lontara.io</title>
<link rel="stylesheet" href="style.css">
<link rel="icon" type="image/png" href="image/dreamina-2026-06-16-7815-Minimalist black line icon of a notebook... (1).png" />
</head>
<body>

<div class="app" id="app">

  <!-- ===================== LAYAR 1: DAFTAR ===================== -->
  <div class="screen" id="screen-list">
    <div class="header">
      <div>
        <div class="header-title">Catatan</div>
      </div>
      <div class="header-count" id="note-count">0 catatan</div>
    </div>

    <div class="note-list" id="note-list">
      <!-- kartu catatan dirender JS di sini -->
    </div>

    <button class="fab" id="fab-new" title="Buat catatan baru" aria-label="Buat catatan baru">
      <!-- Plus icon -->
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M11 2V20M2 11H20" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
      </svg>
    </button>
  </div>

  <!-- ===================== LAYAR 2: EDITOR ===================== -->
  <div class="screen" id="screen-editor">
    <div class="editor-header">
      <button class="btn-icon btn-back" id="btn-back" aria-label="Kembali">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12.5 4L6.5 10L12.5 16" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <div class="editor-actions">
        <button class="btn-icon btn-delete" id="btn-delete" aria-label="Hapus catatan" title="Hapus">
          <svg width="18" height="18" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M3 5H17M8 5V3H12V5M7 5V16H13V5H7Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <button class="btn-save" id="btn-save">Simpan ✓</button>
      </div>
    </div>

    <div class="editor-timestamp" id="editor-timestamp"></div>

    <div class="editor-body">
      <textarea id="input-judul" placeholder="Judul catatan..." rows="1"></textarea>
      <div class="editor-divider"></div>
      <textarea id="input-isi" placeholder="Mulai menulis..."></textarea>
    </div>
  </div>

</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Konfirmasi hapus -->
<div class="confirm-overlay" id="confirm-overlay">
  <div class="confirm-sheet">
    <div class="confirm-title">Hapus Catatan?</div>
    <div class="confirm-desc">Catatan ini akan dihapus secara permanen dan tidak bisa dikembalikan.</div>
    <div class="confirm-buttons">
      <button class="btn-cancel-confirm" id="btn-cancel-confirm">Batal</button>
      <button class="btn-delete-confirm" id="btn-delete-confirm">Hapus</button>
    </div>
  </div>
</div>
<script src="script.js"></script>
</body>
</html>
